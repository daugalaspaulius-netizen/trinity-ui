<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trinity Control Surface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg-noise"></div>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Autonomine Sistema</p>
        <h1>Trinity Interface</h1>
      </div>
      <div class="status-wrap">
        <span id="engineBadge" class="badge">engine: local</span>
      </div>
    </header>

    <section id="chat" class="chat" aria-live="polite"></section>

    <section class="controls">
      <textarea id="messageInput" placeholder="Rasykite zinute Trinity..." rows="2"></textarea>
      <div id="voiceVizWrap" class="voice-viz-wrap" hidden>
        <canvas id="voiceCanvas" width="900" height="120" aria-label="Balso bangos vizualizacija"></canvas>
        <p class="viz-label">Irasymas aktyvus</p>
      </div>
      <div class="buttons">
        <button id="sendBtn" class="btn btn-primary">Siusti</button>
        <button id="recordBtn" class="btn btn-accent">Irasyti balsa</button>
        <button id="stopBtn" class="btn" disabled>Stop</button>
        <button id="uploadAudioBtn" class="btn" type="button">Ikelti audio</button>
        <button id="readLastBtn" class="btn">Skaityti paskutini atsakyma</button>
      </div>
      <input id="audioFileInput" type="file" accept="audio/*" style="display:none" />
      <p id="hint" class="hint">Voice: pirmiausia bandys serverio Whisper, jei nepavyksta - narsykles transkripcija.</p>
    </section>
  </main>

  <template id="messageTemplate">
    <article class="msg">
      <div class="msg-head">
        <strong class="role"></strong>
        <button class="copy-btn" type="button">Copy</button>
      </div>
      <p class="content"></p>
    </article>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
